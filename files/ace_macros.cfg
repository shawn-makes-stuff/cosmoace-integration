# =========================
# CosmoACE printer-side macros
# =========================
#
# Requirements:
# - The gcode_shell_command Klipper extension must be installed.
# - Your existing filament_switch_sensor must call ACE_SENSOR_EVENT on insert/runout.

[gcode_shell_command ace_rpc]
command: /user-resource/ace-addon/ace-command.sh
timeout: 180.
verbose: True

[gcode_macro _ACE_CONFIG]
variable_sensor_name: "runout"
variable_load_to_sensor_search_mm: 1200
variable_load_to_printhead_mm: 730
variable_unload_to_sensor_search_mm: 900
variable_unload_to_sensor_probe_mm: 10
variable_unload_to_sensor_probe_speed_mm_s: 5
variable_retract_slot_mm: 90
variable_extruder_release_mm: 30
variable_extruder_release_speed_mm_s: 4
variable_feed_speed_mm_s: 25
variable_retract_speed_mm_s: 15
variable_purge_mm: 40
variable_purge_temp: 250
variable_purge_speed_mm_s: 3
variable_sync_load_mm: 40
variable_sync_load_chunk_mm: 5
variable_sync_load_settle_s: 0.25
variable_load_settle_s: 2
variable_unload_settle_s: 2
variable_swap_lift_z: 5
variable_lift_speed_mm_s: 10
variable_return_xy_speed_mm_s: 200
variable_return_z_speed_mm_s: 10
variable_cut_x: 255
variable_cut_y: 3
variable_cut_clear_y: 30
gcode:

[gcode_macro _ACE_STATE]
variable_mode: "idle"
variable_current_slot: -1
variable_pending_slot: -1
variable_resume_after_purge: 0
variable_last_event: ""
variable_last_error: ""
variable_sensor_state: -1
variable_return_x: 0.0
variable_return_y: 0.0
variable_return_z: 0.0
variable_has_return_position: 0
gcode:

[gcode_macro _ACE_PRE_TOOLCHANGE]
gcode:
  # no-op hook

[gcode_macro _ACE_POST_TOOLCHANGE]
gcode:
  # no-op hook

[gcode_macro ACE_SET_SENSOR_NAME]
description: Set the filament_switch_sensor object name used by ACE macros
gcode:
  {% set name = params.NAME|string %}
  SET_GCODE_VARIABLE MACRO=_ACE_CONFIG VARIABLE=sensor_name VALUE='"{name}"'
  RESPOND TYPE=echo MSG="ACE sensor_name -> {name}"

[gcode_macro ACE_SET_MODE]
description: MODE=idle|load_to_sensor|start_load_to_sensor|unload_to_sensor|swap_unload_to_sensor|end_unload_to_sensor|load_to_printhead|sync_load|purge|print|orca_start|orca_swap|orca_end
gcode:
  {% set mode = params.MODE|string %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=mode VALUE='"{mode}"'
  RESPOND TYPE=echo MSG="ACE mode -> {mode}"

[gcode_macro ACE_CLEAR_RETURN_POSITION]
description: Clear the saved XY/Z return target
gcode:
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_x VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_y VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_z VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=has_return_position VALUE=0
  RESPOND TYPE=echo MSG="ACE cleared saved return position"

[gcode_macro ACE_SAVE_RETURN_POSITION]
description: Save the current XYZ position for later XY then Z return
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_SAVE_RETURN_POSITION requires the printer to be homed"
  {% else %}
    {% set pos = printer.gcode_move.gcode_position %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_x VALUE={pos.x}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_y VALUE={pos.y}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_z VALUE={pos.z}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=has_return_position VALUE=1
    RESPOND TYPE=echo MSG="ACE saved return position X={pos.x|round(3)} Y={pos.y|round(3)} Z={pos.z|round(3)}"
  {% endif %}

[gcode_macro ACE_RESET_STATE]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_event VALUE='""'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=resume_after_purge VALUE=0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
  UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0
  UPDATE_DELAYED_GCODE ID=_ACE_DELAYED_RESUME_PRINT DURATION=0
  ACE_CLEAR_RETURN_POSITION
  ACE_SET_MODE MODE=idle

[gcode_macro ACE_STATUS]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  RESPOND TYPE=echo MSG="ACE mode={st.mode} current_slot={st.current_slot} pending_slot={st.pending_slot} sensor_name={sensor_name} sensor={sensor} resume_after_purge={st.resume_after_purge} saved_return={st.has_return_position} return_x={st.return_x} return_y={st.return_y} return_z={st.return_z} last_event={st.last_event}"

[gcode_macro _ACE_SLOT_LOAD_RAW]
description: Feed ACE slot 1..4 by a fixed distance
gcode:
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float|int %}
  {% set speed = params.SPEED|default(0)|float|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="feed {slot} {length} {speed}"
  RESPOND TYPE=echo MSG="ACE raw load slot={slot} length={length} speed={speed}"

[gcode_macro _ACE_SLOT_UNLOAD_RAW]
description: Retract ACE slot 1..4 by a fixed distance
gcode:
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float|int %}
  {% set speed = params.SPEED|default(0)|float|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract {slot} {length} {speed}"
  RESPOND TYPE=echo MSG="ACE raw unload slot={slot} length={length} speed={speed}"

[gcode_macro _ACE_SLOT_UNLOAD_WAIT_RAW]
description: Retract ACE slot 1..4 by a fixed distance and wait for it to complete
gcode:
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float|int %}
  {% set speed = params.SPEED|default(0)|float|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract-wait {slot} {length} {speed}"
  RESPOND TYPE=echo MSG="ACE raw unload-wait slot={slot} length={length} speed={speed}"

[gcode_macro _ACE_SLOT_LOAD_TO_SENSOR_WAIT_RAW]
description: Feed ACE slot 1..4 until the filament sensor triggers and wait for it to stop
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 10)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="feed-to-sensor {slot} {length|int} {speed|int} {sensor_name} {timeout_s}"
  RESPOND TYPE=echo MSG="ACE raw load-to-sensor slot={slot} length={length|round(3)} speed={speed|round(3)} sensor={sensor_name}" 

[gcode_macro _ACE_SLOT_UNLOAD_TO_SENSOR_WAIT_RAW]
description: Retract ACE slot 1..4 until the filament sensor clears and wait for it to stop
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 10)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract-to-sensor {slot} {length|int} {speed|int} {sensor_name} {timeout_s}"
  RESPOND TYPE=echo MSG="ACE raw unload-to-sensor slot={slot} length={length|round(3)} speed={speed|round(3)} sensor={sensor_name}"

[gcode_macro _ACE_SLOT_STOP_RAW]
description: Stop the currently moving ACE slot
gcode:
  {% set slot = params.SLOT|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="stop {slot}"
  RESPOND TYPE=echo MSG="ACE raw stop slot={slot}"

[gcode_macro _ACE_SLOT_STOP_UNLOAD_RAW]
description: Stop the currently unwinding ACE slot
gcode:
  {% set slot = params.SLOT|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="stop-unwind {slot}"
  RESPOND TYPE=echo MSG="ACE raw stop-unwind slot={slot}"

[gcode_macro _ACE_HANDLE_SENSOR_CLEAR]
gcode:
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set mode = st.mode|string %}
  {% set current_slot = st.current_slot|int %}
  {% set pending_slot = st.pending_slot|int %}

  UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0
  {% if mode == "unload_to_sensor" %}
    _ACE_SLOT_STOP_UNLOAD_RAW SLOT={current_slot}
    G4 P250
    ACE_SET_MODE MODE=idle
    RESPOND TYPE=echo MSG="ACE slot {current_slot} cleared sensor"
  {% elif mode == "swap_unload_to_sensor" %}
    _ACE_SLOT_STOP_UNLOAD_RAW SLOT={current_slot}
    G4 P250
    RESPOND TYPE=echo MSG="ACE slot {current_slot} cleared sensor"
    ACE_RETRACT_SLOT SLOT={current_slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    ACE_LOAD_TO_SENSOR SLOT={pending_slot} RESUME_AFTER_PURGE=1 AUTO_COMPLETE=1
  {% elif mode == "end_unload_to_sensor" %}
    _ACE_SLOT_STOP_UNLOAD_RAW SLOT={current_slot}
    G4 P250
    RESPOND TYPE=echo MSG="ACE slot {current_slot} cleared sensor"
    ACE_RETRACT_SLOT SLOT={current_slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=resume_after_purge VALUE=0
    ACE_SET_MODE MODE=idle
  {% endif %}

[delayed_gcode _ACE_MONITOR_UNLOAD_TO_SENSOR]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set mode = st.mode|string %}
  {% set current_slot = st.current_slot|int %}

  {% if mode in ["unload_to_sensor", "swap_unload_to_sensor", "end_unload_to_sensor"] and current_slot > 0 %}
    {% if sensor %}
      UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0.05
    {% else %}
      _ACE_HANDLE_SENSOR_CLEAR
    {% endif %}
  {% endif %}

[gcode_macro ACE_SENSOR_EVENT]
description: Dispatcher for insert/runout events from your configured filament_switch_sensor
gcode:
  {% set event = params.EVENT|string|upper %}
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set mode = st.mode|string %}
  {% set current_slot = st.current_slot|int %}
  {% set pending_slot = st.pending_slot|int %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set is_paused = printer.pause_resume.is_paused %}

  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_event VALUE='"{event}"'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}

  {% if mode == "load_to_sensor" and event == "INSERT" %}
    _ACE_SLOT_STOP_RAW SLOT={pending_slot}
    G4 P250
    ACE_SET_MODE MODE=idle
    RESPOND TYPE=echo MSG="ACE slot {pending_slot} reached sensor"
  {% elif mode == "start_load_to_sensor" and event == "INSERT" %}
    _ACE_SLOT_STOP_RAW SLOT={pending_slot}
    G4 P250
    RESPOND TYPE=echo MSG="ACE slot {pending_slot} reached sensor"
    ACE_COMPLETE_LOAD SLOT={pending_slot}
  {% elif mode == "unload_to_sensor" and event == "RUNOUT" %}
    _ACE_HANDLE_SENSOR_CLEAR
  {% elif mode == "swap_unload_to_sensor" and event == "RUNOUT" %}
    _ACE_HANDLE_SENSOR_CLEAR
  {% elif mode == "end_unload_to_sensor" and event == "RUNOUT" %}
    _ACE_HANDLE_SENSOR_CLEAR
  {% elif mode == "print" and event == "RUNOUT" and print_state == "printing" and not is_paused %}
    RESPOND TYPE=echo MSG="ACE runout detected during print"
    PAUSE
  {% else %}
    RESPOND TYPE=echo MSG="ACE sensor event {event} ignored in mode {mode}"
  {% endif %}

[gcode_macro ACE_PAUSE_PRINT]
description: Pause the active print without using the stock park move
gcode:
  {% if printer.pause_resume.is_paused %}
    RESPOND TYPE=echo MSG="ACE pause skipped: printer already paused"
  {% elif printer.print_stats.state|string|lower != "printing" %}
    RESPOND TYPE=error MSG="ACE_PAUSE_PRINT requires an active print"
  {% else %}
    PAUSE_BASE
    RESPOND TYPE=echo MSG="ACE paused active print"
  {% endif %}

[gcode_macro ACE_DROP_BED]
description: Raise Z to create swap clearance on a CoreXY bed-slinger
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set pos = printer.gcode_move.gcode_position %}
  {% set max_z = printer.toolhead.axis_maximum.z %}
  {% set lift = params.LIFT|default(cfg.swap_lift_z)|float %}
  {% set speed = params.SPEED|default(cfg.lift_speed_mm_s)|float %}
  {% set actual_lift = [lift, max_z - pos.z]|min %}

  {% if "z" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_DROP_BED requires Z to be homed"
  {% elif lift <= 0 %}
    RESPOND TYPE=error MSG="ACE_DROP_BED requires LIFT>0"
  {% elif actual_lift <= 0 %}
    RESPOND TYPE=echo MSG="ACE drop-bed skipped: already at Z max"
  {% else %}
    SAVE_GCODE_STATE NAME=ace_drop_bed_state
    G91
    G1 Z{actual_lift} F{speed * 60}
    RESTORE_GCODE_STATE NAME=ace_drop_bed_state
    RESPOND TYPE=echo MSG="ACE dropped bed by {actual_lift|round(3)}mm"
  {% endif %}

[gcode_macro ACE_RETURN_XY]
description: Return to the saved XY position while staying at the current safe Z
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set speed = params.SPEED|default(cfg.return_xy_speed_mm_s)|float %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_RETURN_XY requires the printer to be homed"
  {% elif not st.has_return_position|int %}
    RESPOND TYPE=echo MSG="ACE return XY skipped: no saved position"
  {% else %}
    G90
    G0 X{st.return_x} Y{st.return_y} F{speed * 60}
    M400
    RESPOND TYPE=echo MSG="ACE returned to X={st.return_x|round(3)} Y={st.return_y|round(3)}"
  {% endif %}

[gcode_macro ACE_RETURN_Z]
description: Return to the saved Z position after XY is back in place
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set speed = params.SPEED|default(cfg.return_z_speed_mm_s)|float %}

  {% if "z" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_RETURN_Z requires Z to be homed"
  {% elif not st.has_return_position|int %}
    RESPOND TYPE=echo MSG="ACE return Z skipped: no saved position"
  {% else %}
    G90
    G0 Z{st.return_z} F{speed * 60}
    M400
    RESPOND TYPE=echo MSG="ACE returned to Z={st.return_z|round(3)}"
  {% endif %}

[gcode_macro ACE_RESUME_PRINT]
description: Resume the active print after the ACE swap flow has restored position
gcode:
  {% if not printer.pause_resume.is_paused %}
    RESPOND TYPE=error MSG="ACE_RESUME_PRINT requires a paused print"
  {% else %}
    _ACE_POST_TOOLCHANGE
    RESUME
    RESPOND TYPE=echo MSG="ACE resumed active print"
  {% endif %}

[delayed_gcode _ACE_DELAYED_RESUME_PRINT]
gcode:
  {% if printer.pause_resume.is_paused %}
    ACE_RESUME_PRINT
  {% endif %}

[gcode_macro ACE_LOAD_TO_SENSOR]
description: Feed slot 1..4 until the configured filament sensor inserts
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set resume_after = params.RESUME_AFTER_PURGE|default(st.resume_after_purge)|int %}
  {% set auto_complete = params.AUTO_COMPLETE|default(0)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_LOAD_TO_SENSOR requires SLOT=1..4"
  {% elif sensor %}
    RESPOND TYPE=error MSG="ACE_LOAD_TO_SENSOR refused: sensor already triggered"
  {% else %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=resume_after_purge VALUE={resume_after}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
    {% if auto_complete %}
      ACE_SET_MODE MODE=start_load_to_sensor
    {% else %}
      ACE_SET_MODE MODE=load_to_sensor
    {% endif %}
    _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    RESPOND TYPE=echo MSG="ACE loading slot {slot} to sensor"
  {% endif %}

[gcode_macro ACE_LOAD_TO_PRINTHEAD]
description: Push the pending slot from sensor to the printhead only
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.pending_slot)|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set wait_ms = (((length / (speed if speed > 0 else 1)) + cfg.load_settle_s) * 1000)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_LOAD_TO_PRINTHEAD requires SLOT=1..4 or a pending slot"
  {% elif not sensor %}
    RESPOND TYPE=error MSG="ACE_LOAD_TO_PRINTHEAD refused: sensor is not triggered"
  {% else %}
    ACE_SET_MODE MODE=load_to_printhead
    _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    G4 P{wait_ms}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
    RESPOND TYPE=echo MSG="ACE slot {slot} pushed {length}mm from sensor to printhead"
  {% endif %}

[gcode_macro ACE_UNLOAD_TO_SENSOR]
description: Retract the active slot until the configured filament sensor clears
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set auto_clear = params.AUTO_CLEAR|default(0)|int %}
  {% set next_slot = params.NEXT_SLOT|default(st.pending_slot)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_UNLOAD_TO_SENSOR requires SLOT=1..4 or a current slot"
  {% elif not sensor %}
    UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0
    RESPOND TYPE=echo MSG="ACE sensor already clear for slot {slot}"
    {% if auto_clear and next_slot > 0 %}
      ACE_RETRACT_SLOT SLOT={slot}
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
      ACE_LOAD_TO_SENSOR SLOT={next_slot} RESUME_AFTER_PURGE=1 AUTO_COMPLETE=1
    {% elif auto_clear %}
      ACE_RETRACT_SLOT SLOT={slot}
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=resume_after_purge VALUE=0
      ACE_SET_MODE MODE=idle
    {% else %}
      ACE_SET_MODE MODE=idle
    {% endif %}
  {% else %}
    UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
    {% if next_slot > 0 %}
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    {% endif %}
    {% if auto_clear and next_slot > 0 %}
      ACE_SET_MODE MODE=swap_unload_to_sensor
    {% elif auto_clear %}
      ACE_SET_MODE MODE=end_unload_to_sensor
    {% else %}
      ACE_SET_MODE MODE=unload_to_sensor
    {% endif %}
    _ACE_SLOT_UNLOAD_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    UPDATE_DELAYED_GCODE ID=_ACE_MONITOR_UNLOAD_TO_SENSOR DURATION=0.01
    RESPOND TYPE=echo MSG="ACE unloading slot {slot} to sensor clear"
  {% endif %}

[gcode_macro ACE_PROBE_SENSOR_OUT]
description: Retract a short distance and report whether the filament sensor is clear
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_probe_mm)|float %}
  {% set speed = params.SPEED|default(cfg.unload_to_sensor_probe_speed_mm_s)|float %}
  {% set wait_ms = ((((length / (speed if speed > 0 else 1)) + cfg.unload_settle_s) * 1000)|int) %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_PROBE_SENSOR_OUT requires SLOT=1..4 or a current slot"
  {% else %}
    _ACE_SLOT_UNLOAD_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    G4 P{wait_ms}
    {% set sensor_name = cfg.sensor_name|string %}
    {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
    {% if sensor %}
      RESPOND TYPE=echo MSG="ACE probe-out slot {slot}: sensor still triggered"
    {% else %}
      RESPOND TYPE=echo MSG="ACE probe-out slot {slot}: sensor clear"
    {% endif %}
  {% endif %}

[gcode_macro ACE_PROBE_SENSOR_IN]
description: Feed a short distance and report whether the filament sensor is triggered
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot if st.current_slot|int > 0 else st.pending_slot)|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_probe_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set wait_ms = ((((length / (speed if speed > 0 else 1)) + cfg.load_settle_s) * 1000)|int) %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_PROBE_SENSOR_IN requires SLOT=1..4 or an active slot"
  {% else %}
    _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    G4 P{wait_ms}
    {% set sensor_name = cfg.sensor_name|string %}
    {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
    {% if sensor %}
      RESPOND TYPE=echo MSG="ACE probe-in slot {slot}: sensor triggered"
    {% else %}
      RESPOND TYPE=echo MSG="ACE probe-in slot {slot}: sensor not triggered"
    {% endif %}
  {% endif %}

[gcode_macro ACE_RETRACT_SLOT]
description: Retract the active slot a short distance past the sensor to clear the hub
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set length = params.LENGTH|default(cfg.retract_slot_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_RETRACT_SLOT requires SLOT=1..4 or a current slot"
  {% else %}
    _ACE_SLOT_UNLOAD_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed}
    RESPOND TYPE=echo MSG="ACE retracted slot {slot} by {length}mm"
  {% endif %}

[gcode_macro ACE_UNLOAD_SLOT]
description: Compatibility alias for ACE_RETRACT_SLOT
gcode:
  ACE_RETRACT_SLOT {rawparams}

[gcode_macro ACE_COMPLETE_LOAD]
description: Continue an auto-load flow after the sensor trips
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.pending_slot)|int %}
  {% set push_length = params.LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge = params.PURGE|default(cfg.purge_mm)|float %}
  {% set purge_speed = params.PURGE_SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set wipe = params.WIPE|default(1)|int %}
  {% set resume_after = st.resume_after_purge|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_COMPLETE_LOAD requires SLOT=1..4"
  {% else %}
    ACE_MOVE_TO_PURGE
    ACE_LOAD_TO_PRINTHEAD SLOT={slot} LENGTH={push_length}
    ACE_HEAT_FOR_PURGE TEMP={temp}
    ACE_SYNC_LOAD SLOT={slot} LENGTH={sync_length} SPEED={purge_speed} ACE_SPEED={purge_speed}
    ACE_PURGE LENGTH={purge} SPEED={purge_speed}
    {% if wipe %}
      ACE_WIPE
    {% endif %}
    ACE_SET_MODE MODE=print
    RESPOND TYPE=echo MSG="ACE slot {slot} is ready to print"
    {% if resume_after %}
      SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=resume_after_purge VALUE=0
      ACE_RETURN_XY
      ACE_RETURN_Z
      ACE_RESUME_PRINT
    {% endif %}
  {% endif %}

[gcode_macro ACE_START_PRINT]
description: Home, move to tray, feed to sensor, then continue through purge automatically
gcode:
  {% set slot = params.SLOT|int %}
  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_START_PRINT requires SLOT=1..4"
  {% else %}
    CLEAR_PAUSE
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
    {% endif %}
    ACE_RESET_STATE
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
    ACE_MOVE_TO_PURGE
    ACE_LOAD_TO_SENSOR SLOT={slot} RESUME_AFTER_PURGE=0 AUTO_COMPLETE=1
  {% endif %}

[gcode_macro ACE_MOVE_TO_PURGE]
description: Move the toolhead to the purge tray only
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_MOVE_TO_PURGE requires the printer to be homed"
  {% else %}
    MOVE_TO_TRAY
    RESPOND TYPE=echo MSG="ACE moved to purge location"
  {% endif %}

[gcode_macro ACE_HEAT_FOR_PURGE]
description: Heat the hotend for purge only
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  M109 S{temp}
  RESPOND TYPE=echo MSG="ACE purge temp reached: {temp}C"

[gcode_macro ACE_PURGE]
description: Purge only, assuming the nozzle is already at the purge location and temperature
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set length = params.LENGTH|default(cfg.purge_mm)|float %}
  {% set speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}

  {% if length <= 0 %}
    RESPOND TYPE=error MSG="ACE_PURGE requires LENGTH>0"
  {% elif speed <= 0 %}
    RESPOND TYPE=error MSG="ACE_PURGE requires SPEED>0"
  {% else %}
    ACE_SET_MODE MODE=purge
    SAVE_GCODE_STATE NAME=ace_purge_state
    M83
    G92 E0
    G1 E{length} F{speed * 60}
    M400
    RESTORE_GCODE_STATE NAME=ace_purge_state
    RESPOND TYPE=echo MSG="ACE purged {length}mm"
  {% endif %}

[gcode_macro ACE_SYNC_LOAD]
description: Feed the ACE and extruder together in small chunks to pull filament through the hotend
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot if st.current_slot|int > 0 else st.pending_slot)|int %}
  {% set length = params.LENGTH|default(cfg.sync_load_mm)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set settle_ms = (params.SETTLE_S|default(cfg.sync_load_settle_s)|float * 1000)|int %}
  {% set chunk_count = ((length / chunk) if chunk > 0 else 0)|int %}
  {% set remainder = length - (chunk_count * chunk) %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_SYNC_LOAD requires SLOT=1..4 or a current slot"
  {% elif length <= 0 %}
    RESPOND TYPE=error MSG="ACE_SYNC_LOAD requires LENGTH>0"
  {% elif chunk <= 0 %}
    RESPOND TYPE=error MSG="ACE_SYNC_LOAD requires CHUNK>0"
  {% elif extruder_speed <= 0 or ace_speed <= 0 %}
    RESPOND TYPE=error MSG="ACE_SYNC_LOAD requires SPEED>0 and ACE_SPEED>0"
  {% else %}
    ACE_SET_MODE MODE=sync_load
    SAVE_GCODE_STATE NAME=ace_sync_load_state
    M83
    {% for _ in range(chunk_count) %}
      _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={chunk} SPEED={ace_speed}
      G1 E{chunk} F{extruder_speed * 60}
      M400
      {% if settle_ms > 0 %}
        G4 P{settle_ms}
      {% endif %}
    {% endfor %}
    {% if remainder > 0.001 %}
      _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={remainder} SPEED={ace_speed}
      G1 E{remainder} F{extruder_speed * 60}
      M400
      {% if settle_ms > 0 %}
        G4 P{settle_ms}
      {% endif %}
    {% endif %}
    RESTORE_GCODE_STATE NAME=ace_sync_load_state
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
    RESPOND TYPE=echo MSG="ACE sync-loaded slot {slot} by {length}mm using {chunk}mm chunks"
  {% endif %}

[gcode_macro ACE_LOAD_FOR_PURGE]
description: Move to purge, heat, sync-load filament, purge, and optionally wipe
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot if st.current_slot|int > 0 else st.pending_slot)|int %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge_length = params.PURGE_LENGTH|default(cfg.purge_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set wipe = params.WIPE|default(0)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_LOAD_FOR_PURGE requires SLOT=1..4 or a current slot"
  {% else %}
    ACE_MOVE_TO_PURGE
    ACE_HEAT_FOR_PURGE TEMP={temp}
    ACE_SYNC_LOAD SLOT={slot} LENGTH={sync_length} SPEED={extruder_speed} ACE_SPEED={ace_speed} CHUNK={chunk}
    ACE_PURGE LENGTH={purge_length} SPEED={extruder_speed}
    {% if wipe %}
      ACE_WIPE
    {% endif %}
    RESPOND TYPE=echo MSG="ACE load-for-purge complete for slot {slot}"
  {% endif %}

[gcode_macro ACE_WIPE]
description: Wipe the nozzle at the tray
gcode:
  M729
  RESPOND TYPE=echo MSG="ACE wipe complete"

[gcode_macro ACE_CUT_FILAMENT]
description: Cut filament and release the stub from the extruder path with no tray move
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set release_mm = params.RELEASE_MM|default(cfg.extruder_release_mm)|float %}
  {% set release_speed = params.RELEASE_SPEED|default(cfg.extruder_release_speed_mm_s)|float %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    RESPOND TYPE=error MSG="ACE_CUT_FILAMENT requires the printer to be homed"
  {% else %}
    G90
    G0 Y{cfg.cut_clear_y} F15000
    G0 X{cfg.cut_x} F8000
    G0 Y{cfg.cut_y} F1200
    G0 Y{cfg.cut_clear_y} F8000
    M400
    FORCE_MOVE STEPPER=extruder DISTANCE=-{release_mm} VELOCITY={release_speed}
    M400
    RESPOND TYPE=echo MSG="ACE filament cut and released by {release_mm}mm"
  {% endif %}

[gcode_macro ACE_UNLOAD]
description: Manual unload sequence: move to tray, cut, unload to sensor, then retract the slot clear
gcode:
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_UNLOAD requires SLOT=1..4 or a current slot"
  {% else %}
    ACE_MOVE_TO_PURGE
    ACE_CUT_FILAMENT
    ACE_UNLOAD_TO_SENSOR SLOT={slot} AUTO_CLEAR=1
    RESPOND TYPE=echo MSG="ACE unload started for slot {slot}"
  {% endif %}

[gcode_macro ACE_COLOR_SWAP]
description: Pause, lift Z, cut, move to tray, unload old filament, load new slot, and resume after purge
gcode:
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set next_slot = params.SLOT|int %}
  {% set current_slot = st.current_slot|int %}
  {% set print_state = printer.print_stats.state|string|lower %}

  {% if next_slot < 1 or next_slot > 4 %}
    RESPOND TYPE=error MSG="ACE_COLOR_SWAP requires SLOT=1..4"
  {% elif print_state != "printing" %}
    RESPOND TYPE=error MSG="ACE_COLOR_SWAP requires an active print"
  {% elif printer.pause_resume.is_paused %}
    RESPOND TYPE=error MSG="ACE_COLOR_SWAP refused: printer is already paused"
  {% elif current_slot < 1 or current_slot > 4 %}
    RESPOND TYPE=error MSG="ACE_COLOR_SWAP requires current_slot to be set"
  {% elif next_slot == current_slot %}
    RESPOND TYPE=error MSG="ACE_COLOR_SWAP refused: next slot matches current slot"
  {% else %}
    _ACE_PRE_TOOLCHANGE
    ACE_SAVE_RETURN_POSITION
    ACE_PAUSE_PRINT
    G4 P250
    ACE_DROP_BED
    ACE_CUT_FILAMENT
    ACE_MOVE_TO_PURGE
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    ACE_UNLOAD_TO_SENSOR SLOT={current_slot} AUTO_CLEAR=1 NEXT_SLOT={next_slot}
    RESPOND TYPE=echo MSG="ACE color swap started: {current_slot} -> {next_slot}"
  {% endif %}

[gcode_macro ACE_END_PRINT_CLEAR]
description: Lift Z, cut filament, move to tray, cool down, and retract the active slot clear
gcode:
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set current_slot = st.current_slot|int %}

  {% if current_slot < 1 or current_slot > 4 %}
    M104 S0
    ACE_SET_MODE MODE=idle
    RESPOND TYPE=echo MSG="ACE end-print clear skipped: no active slot"
  {% else %}
    ACE_DROP_BED
    ACE_CUT_FILAMENT
    ACE_MOVE_TO_PURGE
    M104 S0
    ACE_UNLOAD_TO_SENSOR SLOT={current_slot} AUTO_CLEAR=1
    RESPOND TYPE=echo MSG="ACE end-print clear started for slot {current_slot}"
  {% endif %}

[gcode_macro ACE_ORCA_START]
description: Blocking first-load flow for OrcaSlicer using the configured ACE path
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set load_length = params.LOAD_LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set load_speed = params.LOAD_SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set push_length = params.PUSH_LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge_length = params.PURGE|default(cfg.purge_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set wipe = params.WIPE|default(1)|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="ACE_ORCA_START requires SLOT=1..4"
  {% else %}
    CLEAR_PAUSE
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
    {% endif %}
    ACE_RESET_STATE
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
    ACE_SET_MODE MODE=orca_start
    ACE_MOVE_TO_PURGE
    _ACE_SLOT_LOAD_TO_SENSOR_WAIT_RAW SLOT={slot} LENGTH={load_length} SPEED={load_speed} SENSOR={sensor_name}
    G4 P500
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
    ACE_LOAD_TO_PRINTHEAD SLOT={slot} LENGTH={push_length} SPEED={load_speed}
    ACE_HEAT_FOR_PURGE TEMP={temp}
    ACE_SYNC_LOAD SLOT={slot} LENGTH={sync_length} SPEED={extruder_speed} ACE_SPEED={ace_speed} CHUNK={chunk}
    ACE_PURGE LENGTH={purge_length} SPEED={extruder_speed}
    {% if wipe %}
      ACE_WIPE
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
    ACE_SET_MODE MODE=print
    RESPOND TYPE=echo MSG="ACE Orca start complete for slot {slot}"
  {% endif %}

[gcode_macro ACE_ORCA_TOOLCHANGE]
description: Blocking mid-print slot swap for OrcaSlicer
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set next_slot = params.SLOT|int %}
  {% set current_slot = st.current_slot|int %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set unload_length = params.UNLOAD_LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set unload_speed = params.UNLOAD_SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set retract_length = params.RETRACT_LENGTH|default(cfg.retract_slot_mm)|float %}
  {% set load_length = params.LOAD_LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set load_speed = params.LOAD_SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set push_length = params.PUSH_LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge_length = params.PURGE|default(cfg.purge_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set wipe = params.WIPE|default(1)|int %}

  {% if next_slot < 1 or next_slot > 4 %}
    RESPOND TYPE=error MSG="ACE_ORCA_TOOLCHANGE requires SLOT=1..4"
  {% elif print_state != "printing" %}
    RESPOND TYPE=error MSG="ACE_ORCA_TOOLCHANGE requires an active print"
  {% elif printer.pause_resume.is_paused %}
    RESPOND TYPE=error MSG="ACE_ORCA_TOOLCHANGE refused: printer is already paused"
  {% elif current_slot < 1 or current_slot > 4 %}
    RESPOND TYPE=error MSG="ACE_ORCA_TOOLCHANGE requires current_slot to be set"
  {% elif next_slot == current_slot %}
    RESPOND TYPE=echo MSG="ACE Orca toolchange skipped: slot {next_slot} already active"
  {% else %}
    ACE_SET_MODE MODE=orca_swap
    _ACE_PRE_TOOLCHANGE
    ACE_SAVE_RETURN_POSITION
    ACE_PAUSE_PRINT
    G4 P250
    ACE_DROP_BED
    ACE_CUT_FILAMENT
    ACE_MOVE_TO_PURGE
    _ACE_SLOT_UNLOAD_TO_SENSOR_WAIT_RAW SLOT={current_slot} LENGTH={unload_length} SPEED={unload_speed} SENSOR={sensor_name}
    G4 P500
    ACE_RETRACT_SLOT SLOT={current_slot} LENGTH={retract_length}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    _ACE_SLOT_LOAD_TO_SENSOR_WAIT_RAW SLOT={next_slot} LENGTH={load_length} SPEED={load_speed} SENSOR={sensor_name}
    G4 P500
    ACE_LOAD_TO_PRINTHEAD SLOT={next_slot} LENGTH={push_length} SPEED={load_speed}
    ACE_HEAT_FOR_PURGE TEMP={temp}
    ACE_SYNC_LOAD SLOT={next_slot} LENGTH={sync_length} SPEED={extruder_speed} ACE_SPEED={ace_speed} CHUNK={chunk}
    ACE_PURGE LENGTH={purge_length} SPEED={extruder_speed}
    {% if wipe %}
      ACE_WIPE
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={next_slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    ACE_SET_MODE MODE=print
    ACE_RETURN_XY
    ACE_RETURN_Z
    UPDATE_DELAYED_GCODE ID=_ACE_DELAYED_RESUME_PRINT DURATION=0.1
    RESPOND TYPE=echo MSG="ACE Orca toolchange complete: {current_slot} -> {next_slot}"
  {% endif %}

[gcode_macro ACE_ORCA_END_PRINT]
description: Blocking end-of-print clear for OrcaSlicer
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set current_slot = st.current_slot|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set unload_length = params.UNLOAD_LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set unload_speed = params.UNLOAD_SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set retract_length = params.RETRACT_LENGTH|default(cfg.retract_slot_mm)|float %}

  {% if current_slot < 1 or current_slot > 4 %}
    M104 S0
    ACE_RESET_STATE
    RESPOND TYPE=echo MSG="ACE Orca end skipped: no active slot"
  {% else %}
    ACE_SET_MODE MODE=orca_end
    ACE_DROP_BED
    ACE_CUT_FILAMENT
    ACE_MOVE_TO_PURGE
    M104 S0
    _ACE_SLOT_UNLOAD_TO_SENSOR_WAIT_RAW SLOT={current_slot} LENGTH={unload_length} SPEED={unload_speed} SENSOR={sensor_name}
    ACE_RETRACT_SLOT SLOT={current_slot} LENGTH={retract_length}
    ACE_RESET_STATE
    RESPOND TYPE=echo MSG="ACE Orca end complete for slot {current_slot}"
  {% endif %}

[gcode_macro _ACE_TOOL_SELECT]
description: Route slicer tool selections into the blocking Orca path during prints
gcode:
  {% set slot = params.SLOT|int %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set current_slot = printer["gcode_macro _ACE_STATE"].current_slot|int %}

  {% if slot < 1 or slot > 4 %}
    RESPOND TYPE=error MSG="_ACE_TOOL_SELECT requires SLOT=1..4"
  {% elif print_state == "printing" %}
    ACE_ORCA_TOOLCHANGE SLOT={slot}
  {% elif current_slot == slot %}
    RESPOND TYPE=echo MSG="ACE tool {slot} already active outside print"
  {% else %}
    RESPOND TYPE=echo MSG="ACE tool select {slot} ignored outside active print; use ACE_ORCA_START or ACE_LOAD_TO_SENSOR"
  {% endif %}

[gcode_macro T0]
gcode:
  _ACE_TOOL_SELECT SLOT=1

[gcode_macro T1]
gcode:
  _ACE_TOOL_SELECT SLOT=2

[gcode_macro T2]
gcode:
  _ACE_TOOL_SELECT SLOT=3

[gcode_macro T3]
gcode:
  _ACE_TOOL_SELECT SLOT=4
