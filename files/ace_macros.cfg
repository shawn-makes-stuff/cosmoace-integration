# =========================
# CosmoACE printer-side macros
# =========================
#
# Requirements:
# - The gcode_shell_command Klipper extension must be installed.
# - Your filament_switch_sensor should call _ACE_SENSOR_EVENT on insert/runout.

[gcode_shell_command ace_rpc]
command: /user-resource/ace-addon/ace-command.sh
timeout: 180.
verbose: True

[gcode_shell_command ace_rpc_verbose]
command: /user-resource/ace-addon/ace-command.sh
timeout: 180.
verbose: True

[gcode_macro _ACE_CONFIG]
variable_sensor_name: "runout"
variable_load_to_sensor_search_mm: 1200
variable_load_to_printhead_mm: 730
variable_unload_to_sensor_search_mm: 900
variable_unload_to_sensor_probe_mm: 10
variable_unload_to_sensor_probe_speed_mm_s: 5
variable_retract_slot_mm: 90
variable_clear_hub_step_mm: 10
variable_clear_hub_max_extra_mm: 60
variable_clear_hub_settle_s: 0.25
variable_clear_hub_confirm_s: 1.0
variable_extruder_release_mm: 30
variable_extruder_release_speed_mm_s: 4
variable_feed_speed_mm_s: 25
variable_retract_speed_mm_s: 15
variable_purge_mm: 40
variable_purge_chunk_mm: 100
variable_purge_temp: 250
variable_purge_speed_mm_s: 3
variable_sync_load_mm: 40
variable_sync_load_chunk_mm: 5
variable_sync_load_settle_s: 0.25
variable_swap_lift_z: 5
variable_lift_speed_mm_s: 10
variable_return_xy_speed_mm_s: 200
variable_return_z_speed_mm_s: 10
variable_cut_x: 255
variable_cut_y: 3
variable_cut_clear_y: 30
gcode:

[gcode_macro _ACE_STATE]
variable_mode: "idle"
variable_current_slot: -1
variable_pending_slot: -1
variable_last_event: ""
variable_last_error: ""
variable_sensor_state: -1
variable_return_x: 0.0
variable_return_y: 0.0
variable_return_z: 0.0
variable_has_return_position: 0
gcode:

[gcode_macro _ACE_PRE_TOOLCHANGE]
gcode:
  # no-op hook

[gcode_macro _ACE_POST_TOOLCHANGE]
gcode:
  # no-op hook

[gcode_macro ACE_SET_SENSOR_NAME]
description: Set the filament_switch_sensor object name used by ACE macros
gcode:
  {% set name = params.NAME|string %}
  {% if not name %}
    { action_raise_error("ACE_SET_SENSOR_NAME requires NAME") }
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_ACE_CONFIG VARIABLE=sensor_name VALUE='"{name}"'
  RESPOND TYPE=echo MSG="ACE sensor_name -> {name}"

[gcode_macro _ACE_SET_MODE]
gcode:
  {% set mode = params.MODE|string %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=mode VALUE='"{mode}"'

[gcode_macro _ACE_CLEAR_RETURN_POSITION]
gcode:
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_x VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_y VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_z VALUE=0.0
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=has_return_position VALUE=0

[gcode_macro _ACE_SAVE_RETURN_POSITION]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_SAVE_RETURN_POSITION requires the printer to be homed") }
  {% endif %}
  {% set pos = printer.gcode_move.gcode_position %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_x VALUE={pos.x}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_y VALUE={pos.y}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=return_z VALUE={pos.z}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=has_return_position VALUE=1

[gcode_macro _ACE_RESET_STATE]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE=-1
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_event VALUE='""'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  UPDATE_DELAYED_GCODE ID=_ACE_DELAYED_RESUME_PRINT DURATION=0
  _ACE_CLEAR_RETURN_POSITION
  _ACE_SET_MODE MODE=idle

[gcode_macro ACE_STATUS]
description: Print current ACE state for troubleshooting
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  RESPOND TYPE=echo MSG="ACE mode={st.mode} current_slot={st.current_slot} pending_slot={st.pending_slot} sensor_name={sensor_name} sensor={sensor} saved_return={st.has_return_position} return_x={st.return_x} return_y={st.return_y} return_z={st.return_z} last_event={st.last_event} last_error={st.last_error}"

[gcode_macro ACE_SLOT_STATUS]
description: Query ACE slot readiness directly from the addon service
gcode:
  {% set slot = params.SLOT|int %}
  {% if slot < 1 or slot > 4 %}
    { action_raise_error("ACE_SLOT_STATUS requires SLOT=1..4") }
  {% endif %}
  RUN_SHELL_COMMAND CMD=ace_rpc_verbose PARAMS="slot-status {slot}"

[gcode_macro _ACE_ASSERT_SLOT_READY]
gcode:
  {% set slot = params.SLOT|int %}
  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_ASSERT_SLOT_READY requires SLOT=1..4") }
  {% endif %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="assert-slot-ready {slot}"

[gcode_macro _ACE_SLOT_LOAD_RAW]
gcode:
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float|int %}
  {% set speed = params.SPEED|default(0)|float|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="feed {slot} {length} {speed}"

[gcode_macro _ACE_SLOT_LOAD_WAIT_RAW]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 5)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="feed-wait {slot} {length|int} {speed|int} {timeout_s}"

[gcode_macro _ACE_SLOT_UNLOAD_RAW]
gcode:
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float|int %}
  {% set speed = params.SPEED|default(0)|float|int %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract {slot} {length} {speed}"

[gcode_macro _ACE_SLOT_UNLOAD_WAIT_RAW]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(0)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 5)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract-wait {slot} {length|int} {speed|int} {timeout_s}"

[gcode_macro _ACE_SLOT_WAIT_IDLE_RAW]
gcode:
  {% set slot = params.SLOT|int %}
  {% set timeout_s = params.TIMEOUT_S|default(5)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="wait-motion {slot} {timeout_s}"

[gcode_macro _ACE_SLOT_LOAD_TO_SENSOR_WAIT_RAW]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 10)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="feed-to-sensor {slot} {length|int} {speed|int} {sensor_name} {timeout_s}"

[gcode_macro _ACE_SLOT_UNLOAD_TO_SENSOR_WAIT_RAW]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set timeout_s = params.TIMEOUT_S|default((length / (speed if speed > 0 else 1)) + 10)|float %}
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="retract-to-sensor {slot} {length|int} {speed|int} {sensor_name} {timeout_s}"

[gcode_macro _ACE_VERIFY_SENSOR_TRIGGERED]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  {% if not sensor %}
    { action_raise_error("_ACE_VERIFY_SENSOR_TRIGGERED failed: sensor is not triggered") }
  {% endif %}

[gcode_macro _ACE_VERIFY_SENSOR_CLEAR]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  {% if sensor %}
    { action_raise_error("_ACE_VERIFY_SENSOR_CLEAR failed: sensor is still triggered") }
  {% endif %}

[gcode_macro _ACE_SENSOR_EVENT]
gcode:
  {% set event = params.EVENT|string|upper %}
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set mode = st.mode|string %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set is_paused = printer.pause_resume.is_paused %}

  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_event VALUE='"{event}"'
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}

  {% if mode == "print" and event == "RUNOUT" and print_state == "printing" and not is_paused %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='"runout_during_print"'
    RESPOND TYPE=echo MSG="ACE runout detected during print"
    PAUSE
  {% endif %}

[gcode_macro _ACE_PAUSE_PRINT]
gcode:
  {% if printer.pause_resume.is_paused %}
    { action_raise_error("_ACE_PAUSE_PRINT refused: printer is already paused") }
  {% elif printer.print_stats.state|string|lower != "printing" %}
    { action_raise_error("_ACE_PAUSE_PRINT requires an active print") }
  {% endif %}
  PAUSE_BASE
  RESPOND TYPE=echo MSG="Print paused for toolchange"

[gcode_macro _ACE_DROP_BED]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set pos = printer.gcode_move.gcode_position %}
  {% set max_z = printer.toolhead.axis_maximum.z %}
  {% set lift = params.LIFT|default(cfg.swap_lift_z)|float %}
  {% set speed = params.SPEED|default(cfg.lift_speed_mm_s)|float %}
  {% set actual_lift = [lift, max_z - pos.z]|min %}

  {% if "z" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_DROP_BED requires Z to be homed") }
  {% elif lift <= 0 %}
    { action_raise_error("_ACE_DROP_BED requires LIFT>0") }
  {% elif actual_lift <= 0 %}
    # already at safe height
  {% else %}
    SAVE_GCODE_STATE NAME=ace_drop_bed_state
    G91
    G1 Z{actual_lift} F{speed * 60}
    M400
    RESTORE_GCODE_STATE NAME=ace_drop_bed_state
  {% endif %}

[gcode_macro _ACE_RETURN_XY]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set speed = params.SPEED|default(cfg.return_xy_speed_mm_s)|float %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_RETURN_XY requires the printer to be homed") }
  {% elif not st.has_return_position|int %}
    # nothing to restore
  {% else %}
    G90
    G0 X{st.return_x} Y{st.return_y} F{speed * 60}
    M400
  {% endif %}

[gcode_macro _ACE_RETURN_Z]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set speed = params.SPEED|default(cfg.return_z_speed_mm_s)|float %}

  {% if "z" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_RETURN_Z requires Z to be homed") }
  {% elif not st.has_return_position|int %}
    # nothing to restore
  {% else %}
    G90
    G0 Z{st.return_z} F{speed * 60}
    M400
  {% endif %}

[gcode_macro _ACE_RESUME_PRINT]
gcode:
  {% if not printer.pause_resume.is_paused %}
    { action_raise_error("_ACE_RESUME_PRINT requires a paused print") }
  {% endif %}
  _ACE_POST_TOOLCHANGE
  RESUME
  RESPOND TYPE=echo MSG="Print resumed"

[delayed_gcode _ACE_DELAYED_RESUME_PRINT]
gcode:
  {% if printer.pause_resume.is_paused %}
    _ACE_RESUME_PRINT
  {% endif %}

[gcode_macro ACE_LOAD_TO_SENSOR]
description: Feed a slot until the configured filament sensor triggers
gcode:
  _ACE_LOAD_TO_SENSOR {rawparams}

[gcode_macro _ACE_LOAD_TO_SENSOR]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_LOAD_TO_SENSOR requires SLOT=1..4") }
  {% elif sensor %}
    { action_raise_error("_ACE_LOAD_TO_SENSOR refused: sensor already triggered") }
  {% endif %}

  _ACE_ASSERT_SLOT_READY SLOT={slot}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
  _ACE_SET_MODE MODE=load_to_sensor
  _ACE_SLOT_LOAD_TO_SENSOR_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed} SENSOR={sensor_name}
  _ACE_VERIFY_SENSOR_TRIGGERED SENSOR={sensor_name}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE=1
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Filament loaded to sensor: slot {slot}"

[gcode_macro ACE_LOAD_TO_PRINTHEAD]
description: Push the pending slot from the sensor to the printhead
gcode:
  _ACE_LOAD_TO_PRINTHEAD {rawparams}

[gcode_macro _ACE_LOAD_TO_PRINTHEAD]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.pending_slot)|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_LOAD_TO_PRINTHEAD requires SLOT=1..4 or a pending slot") }
  {% elif not sensor %}
    { action_raise_error("_ACE_LOAD_TO_PRINTHEAD refused: sensor is not triggered") }
  {% endif %}

  _ACE_SET_MODE MODE=load_to_printhead
  _ACE_SLOT_LOAD_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Filament loaded to printhead: slot {slot}"

[gcode_macro ACE_UNLOAD_TO_SENSOR]
description: Retract the active slot until the configured filament sensor clears
gcode:
  _ACE_UNLOAD_TO_SENSOR {rawparams}

[gcode_macro _ACE_UNLOAD_TO_SENSOR]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_UNLOAD_TO_SENSOR requires SLOT=1..4 or a current slot") }
  {% elif not sensor %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE=0
    _ACE_SET_MODE MODE=idle
    RESPOND TYPE=echo MSG="Filament already clear at sensor: slot {slot}"
  {% else %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=last_error VALUE='""'
    _ACE_SET_MODE MODE=unload_to_sensor
    _ACE_SLOT_UNLOAD_TO_SENSOR_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed} SENSOR={sensor_name}
    _ACE_VERIFY_SENSOR_CLEAR SENSOR={sensor_name}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE=0
    _ACE_SET_MODE MODE=idle
    RESPOND TYPE=echo MSG="Filament unloaded to sensor: slot {slot}"
  {% endif %}

[gcode_macro ACE_RETRACT_SLOT]
description: Retract the active slot a short distance past the sensor to clear the hub
gcode:
  _ACE_RETRACT_SLOT {rawparams}

[gcode_macro _ACE_RETRACT_SLOT]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set length = params.LENGTH|default(cfg.retract_slot_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_RETRACT_SLOT requires SLOT=1..4 or a current slot") }
  {% endif %}

  _ACE_SET_MODE MODE=retract_slot
  _ACE_SLOT_UNLOAD_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed}
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Filament retracted past sensor: slot {slot}"

[gcode_macro ACE_CLEAR_HUB]
description: Retract the active slot until the hub path is confirmed clear at the filament sensor
gcode:
  _ACE_CLEAR_HUB {rawparams}

[gcode_macro _ACE_CLEAR_HUB]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set base_length = params.LENGTH|default(cfg.retract_slot_mm)|float %}
  {% set step = params.STEP|default(cfg.clear_hub_step_mm)|float %}
  {% set max_extra = params.MAX_EXTRA|default(cfg.clear_hub_max_extra_mm)|float %}
  {% set speed = params.SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set settle_ms = (params.SETTLE_S|default(cfg.clear_hub_settle_s)|float * 1000)|int %}
  {% set confirm_s = params.CONFIRM_S|default(cfg.clear_hub_confirm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_CLEAR_HUB requires SLOT=1..4 or a current slot") }
  {% elif base_length <= 0 %}
    { action_raise_error("_ACE_CLEAR_HUB requires LENGTH>0") }
  {% elif step <= 0 %}
    { action_raise_error("_ACE_CLEAR_HUB requires STEP>0") }
  {% elif max_extra < 0 %}
    { action_raise_error("_ACE_CLEAR_HUB requires MAX_EXTRA>=0") }
  {% elif confirm_s < 0 %}
    { action_raise_error("_ACE_CLEAR_HUB requires CONFIRM_S>=0") }
  {% endif %}

  _ACE_SET_MODE MODE=clear_hub
  RUN_SHELL_COMMAND CMD=ace_rpc PARAMS="clear-hub {slot} {base_length|int} {step|int} {max_extra|int} {speed|int} {sensor_name} {(settle_ms / 1000.0)} {confirm_s}"
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE=0
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Hub cleared: slot {slot}"

[gcode_macro ACE_PROBE_SENSOR_OUT]
description: Retract a short distance and report whether the filament sensor is clear
gcode:
  _ACE_PROBE_SENSOR_OUT {rawparams}

[gcode_macro _ACE_PROBE_SENSOR_OUT]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot)|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_probe_mm)|float %}
  {% set speed = params.SPEED|default(cfg.unload_to_sensor_probe_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_PROBE_SENSOR_OUT requires SLOT=1..4 or a current slot") }
  {% endif %}

  _ACE_SLOT_UNLOAD_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed}
  _ACE_REPORT_SENSOR_OUT SLOT={slot}

[gcode_macro _ACE_REPORT_SENSOR_OUT]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  {% if sensor %}
    RESPOND TYPE=echo MSG="ACE probe-out slot {slot}: sensor still triggered"
  {% else %}
    RESPOND TYPE=echo MSG="ACE probe-out slot {slot}: sensor clear"
  {% endif %}

[gcode_macro ACE_PROBE_SENSOR_IN]
description: Feed a short distance and report whether the filament sensor is triggered
gcode:
  _ACE_PROBE_SENSOR_IN {rawparams}

[gcode_macro _ACE_PROBE_SENSOR_IN]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot if st.current_slot|int > 0 else st.pending_slot)|int %}
  {% set length = params.LENGTH|default(cfg.unload_to_sensor_probe_mm)|float %}
  {% set speed = params.SPEED|default(cfg.feed_speed_mm_s)|float %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_PROBE_SENSOR_IN requires SLOT=1..4 or an active slot") }
  {% endif %}

  _ACE_SLOT_LOAD_WAIT_RAW SLOT={slot} LENGTH={length} SPEED={speed}
  _ACE_REPORT_SENSOR_IN SLOT={slot}

[gcode_macro _ACE_REPORT_SENSOR_IN]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = cfg.sensor_name|string %}
  {% set sensor = printer["filament_switch_sensor " ~ sensor_name].filament_detected|int %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=sensor_state VALUE={sensor}
  {% if sensor %}
    RESPOND TYPE=echo MSG="ACE probe-in slot {slot}: sensor triggered"
  {% else %}
    RESPOND TYPE=echo MSG="ACE probe-in slot {slot}: sensor not triggered"
  {% endif %}

[gcode_macro _ACE_MOVE_TO_PURGE]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_MOVE_TO_PURGE requires the printer to be homed") }
  {% endif %}
  MOVE_TO_TRAY
  M400

[gcode_macro _ACE_HEAT_FOR_PURGE]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  M109 S{temp}

[gcode_macro ACE_PURGE]
description: Purge only, assuming the nozzle is already at the purge location and temperature
gcode:
  _ACE_PURGE {rawparams}

[gcode_macro _ACE_PURGE]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set length = params.LENGTH|default(cfg.purge_mm)|float %}
  {% set chunk = params.CHUNK|default(cfg.purge_chunk_mm)|float %}
  {% set speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set chunk_count = ((length / chunk) if chunk > 0 else 0)|int %}
  {% set remainder = length - (chunk_count * chunk) %}

  {% if length <= 0 %}
    { action_raise_error("_ACE_PURGE requires LENGTH>0") }
  {% elif chunk <= 0 %}
    { action_raise_error("_ACE_PURGE requires CHUNK>0") }
  {% elif speed <= 0 %}
    { action_raise_error("_ACE_PURGE requires SPEED>0") }
  {% elif not printer.extruder.can_extrude %}
    { action_raise_error("_ACE_PURGE refused: nozzle is below min_extrude_temp") }
  {% endif %}

  _ACE_SET_MODE MODE=purge
  SAVE_GCODE_STATE NAME=ace_purge_state
  M83
  G92 E0
  {% for _ in range(chunk_count) %}
    G1 E{chunk} F{speed * 60}
  {% endfor %}
  {% if remainder > 0.001 %}
    G1 E{remainder} F{speed * 60}
  {% endif %}
  M400
  RESTORE_GCODE_STATE NAME=ace_purge_state
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Purged filament: {length}mm"

[gcode_macro ACE_SYNC_LOAD]
description: Feed the ACE and extruder together in small chunks to pull filament through the hotend
gcode:
  _ACE_SYNC_LOAD {rawparams}

[gcode_macro _ACE_SYNC_LOAD]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set slot = params.SLOT|default(st.current_slot if st.current_slot|int > 0 else st.pending_slot)|int %}
  {% set length = params.LENGTH|default(cfg.sync_load_mm)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set settle_ms = (params.SETTLE_S|default(cfg.sync_load_settle_s)|float * 1000)|int %}
  {% set chunk_count = ((length / chunk) if chunk > 0 else 0)|int %}
  {% set remainder = length - (chunk_count * chunk) %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_SYNC_LOAD requires SLOT=1..4 or a current slot") }
  {% elif length <= 0 %}
    { action_raise_error("_ACE_SYNC_LOAD requires LENGTH>0") }
  {% elif chunk <= 0 %}
    { action_raise_error("_ACE_SYNC_LOAD requires CHUNK>0") }
  {% elif extruder_speed <= 0 or ace_speed <= 0 %}
    { action_raise_error("_ACE_SYNC_LOAD requires SPEED>0 and ACE_SPEED>0") }
  {% elif not printer.extruder.can_extrude %}
    { action_raise_error("_ACE_SYNC_LOAD refused: nozzle is below min_extrude_temp") }
  {% endif %}

  _ACE_SET_MODE MODE=sync_load
  SAVE_GCODE_STATE NAME=ace_sync_load_state
  M83
  {% for _ in range(chunk_count) %}
    {% set timeout_s = (chunk / (ace_speed if ace_speed > 0 else 1)) + 5 %}
    _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={chunk} SPEED={ace_speed}
    G1 E{chunk} F{extruder_speed * 60}
    M400
    _ACE_SLOT_WAIT_IDLE_RAW SLOT={slot} TIMEOUT_S={timeout_s}
    {% if settle_ms > 0 %}
      G4 P{settle_ms}
    {% endif %}
  {% endfor %}
  {% if remainder > 0.001 %}
    {% set timeout_s = (remainder / (ace_speed if ace_speed > 0 else 1)) + 5 %}
    _ACE_SLOT_LOAD_RAW SLOT={slot} LENGTH={remainder} SPEED={ace_speed}
    G1 E{remainder} F{extruder_speed * 60}
    M400
    _ACE_SLOT_WAIT_IDLE_RAW SLOT={slot} TIMEOUT_S={timeout_s}
    {% if settle_ms > 0 %}
      G4 P{settle_ms}
    {% endif %}
  {% endif %}
  RESTORE_GCODE_STATE NAME=ace_sync_load_state
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Filament synced through hotend: slot {slot}"

[gcode_macro ACE_WIPE]
description: Wipe the nozzle at the tray
gcode:
  _ACE_WIPE

[gcode_macro _ACE_WIPE]
gcode:
  _ACE_SET_MODE MODE=wipe
  M729
  M400
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Wipe complete"

[gcode_macro _ACE_CUT_FILAMENT]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set release_mm = params.RELEASE_MM|default(cfg.extruder_release_mm)|float %}
  {% set release_speed = params.RELEASE_SPEED|default(cfg.extruder_release_speed_mm_s)|float %}

  {% if "xyz" not in printer.toolhead.homed_axes %}
    { action_raise_error("_ACE_CUT_FILAMENT requires the printer to be homed") }
  {% endif %}

  _ACE_SET_MODE MODE=cut
  G90
  G0 Y{cfg.cut_clear_y} F15000
  G0 X{cfg.cut_x} F8000
  G0 Y{cfg.cut_y} F1200
  G0 Y{cfg.cut_clear_y} F8000
  M400
  FORCE_MOVE STEPPER=extruder DISTANCE=-{release_mm} VELOCITY={release_speed}
  M400
  _ACE_SET_MODE MODE=idle
  RESPOND TYPE=echo MSG="Filament cut"

[gcode_macro _ACE_ORCA_START]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set slot = params.SLOT|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set load_length = params.LOAD_LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set load_speed = params.LOAD_SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set push_length = params.PUSH_LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge_length = params.PURGE|default(cfg.purge_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set wipe = params.WIPE|default(1)|int %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_ORCA_START requires SLOT=1..4") }
  {% endif %}

  CLEAR_PAUSE
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  _ACE_RESET_STATE
  _ACE_ASSERT_SLOT_READY SLOT={slot}
  _ACE_MOVE_TO_PURGE
  _ACE_LOAD_TO_SENSOR SLOT={slot} LENGTH={load_length} SPEED={load_speed} SENSOR={sensor_name}
  G4 P500
  _ACE_LOAD_TO_PRINTHEAD SLOT={slot} LENGTH={push_length} SPEED={load_speed}
  _ACE_HEAT_FOR_PURGE TEMP={temp}
  _ACE_SYNC_LOAD SLOT={slot} LENGTH={sync_length} SPEED={extruder_speed} ACE_SPEED={ace_speed} CHUNK={chunk}
  _ACE_PURGE LENGTH={purge_length} SPEED={extruder_speed}
  {% if wipe %}
    _ACE_WIPE
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={slot}
  SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={slot}
  _ACE_SET_MODE MODE=print

[gcode_macro _ACE_ORCA_TOOLCHANGE]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set next_slot = params.SLOT|int %}
  {% set current_slot = st.current_slot|int %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set unload_length = params.UNLOAD_LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set unload_speed = params.UNLOAD_SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set retract_length = params.RETRACT_LENGTH|default(cfg.retract_slot_mm)|float %}
  {% set load_length = params.LOAD_LENGTH|default(cfg.load_to_sensor_search_mm)|float %}
  {% set load_speed = params.LOAD_SPEED|default(cfg.feed_speed_mm_s)|float %}
  {% set push_length = params.PUSH_LENGTH|default(cfg.load_to_printhead_mm)|float %}
  {% set temp = params.TEMP|default(cfg.purge_temp)|int %}
  {% set sync_length = params.SYNC_LENGTH|default(cfg.sync_load_mm)|float %}
  {% set purge_length = params.PURGE|default(cfg.purge_mm)|float %}
  {% set extruder_speed = params.SPEED|default(cfg.purge_speed_mm_s)|float %}
  {% set ace_speed = params.ACE_SPEED|default(extruder_speed)|float %}
  {% set chunk = params.CHUNK|default(cfg.sync_load_chunk_mm)|float %}
  {% set wipe = params.WIPE|default(1)|int %}

  {% if next_slot < 1 or next_slot > 4 %}
    { action_raise_error("_ACE_ORCA_TOOLCHANGE requires SLOT=1..4") }
  {% elif print_state != "printing" %}
    { action_raise_error("_ACE_ORCA_TOOLCHANGE requires an active print") }
  {% elif printer.pause_resume.is_paused %}
    { action_raise_error("_ACE_ORCA_TOOLCHANGE refused: printer is already paused") }
  {% elif current_slot < 1 or current_slot > 4 %}
    { action_raise_error("_ACE_ORCA_TOOLCHANGE requires current_slot to be set") }
  {% elif next_slot == current_slot %}
    RESPOND TYPE=echo MSG="Toolchange skipped: slot {next_slot} already active"
  {% else %}
    _ACE_ASSERT_SLOT_READY SLOT={next_slot}
    _ACE_PRE_TOOLCHANGE
    _ACE_SAVE_RETURN_POSITION
    _ACE_PAUSE_PRINT
    G4 P250
    _ACE_DROP_BED
    _ACE_CUT_FILAMENT
    _ACE_MOVE_TO_PURGE
    ACE_UNLOAD_TO_SENSOR SLOT={current_slot} LENGTH={unload_length} SPEED={unload_speed} SENSOR={sensor_name}
    G4 P500
    ACE_CLEAR_HUB SLOT={current_slot} LENGTH={retract_length} SENSOR={sensor_name}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE=-1
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    _ACE_LOAD_TO_SENSOR SLOT={next_slot} LENGTH={load_length} SPEED={load_speed} SENSOR={sensor_name}
    G4 P500
    _ACE_LOAD_TO_PRINTHEAD SLOT={next_slot} LENGTH={push_length} SPEED={load_speed}
    _ACE_HEAT_FOR_PURGE TEMP={temp}
    _ACE_SYNC_LOAD SLOT={next_slot} LENGTH={sync_length} SPEED={extruder_speed} ACE_SPEED={ace_speed} CHUNK={chunk}
    _ACE_PURGE LENGTH={purge_length} SPEED={extruder_speed}
    {% if wipe %}
      _ACE_WIPE
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=current_slot VALUE={next_slot}
    SET_GCODE_VARIABLE MACRO=_ACE_STATE VARIABLE=pending_slot VALUE={next_slot}
    _ACE_SET_MODE MODE=print
    _ACE_RETURN_XY
    _ACE_RETURN_Z
    UPDATE_DELAYED_GCODE ID=_ACE_DELAYED_RESUME_PRINT DURATION=0.1
  {% endif %}

[gcode_macro _ACE_ORCA_END_PRINT]
gcode:
  {% set cfg = printer["gcode_macro _ACE_CONFIG"] %}
  {% set st = printer["gcode_macro _ACE_STATE"] %}
  {% set current_slot = st.current_slot|int %}
  {% set sensor_name = params.SENSOR|default(cfg.sensor_name)|string %}
  {% set unload_length = params.UNLOAD_LENGTH|default(cfg.unload_to_sensor_search_mm)|float %}
  {% set unload_speed = params.UNLOAD_SPEED|default(cfg.retract_speed_mm_s)|float %}
  {% set retract_length = params.RETRACT_LENGTH|default(cfg.retract_slot_mm)|float %}

  {% if current_slot < 1 or current_slot > 4 %}
    M104 S0
    _ACE_RESET_STATE
    RESPOND TYPE=echo MSG="End clear skipped: no active slot"
  {% else %}
    _ACE_DROP_BED
    _ACE_CUT_FILAMENT
    _ACE_MOVE_TO_PURGE
    M104 S0
    ACE_UNLOAD_TO_SENSOR SLOT={current_slot} LENGTH={unload_length} SPEED={unload_speed} SENSOR={sensor_name}
    ACE_CLEAR_HUB SLOT={current_slot} LENGTH={retract_length} SENSOR={sensor_name}
    _ACE_RESET_STATE
    RESPOND TYPE=echo MSG="End clear complete: slot {current_slot}"
  {% endif %}

[gcode_macro _ACE_TOOL_SELECT]
gcode:
  {% set slot = params.SLOT|int %}
  {% set print_state = printer.print_stats.state|string|lower %}
  {% set current_slot = printer["gcode_macro _ACE_STATE"].current_slot|int %}

  {% if slot < 1 or slot > 4 %}
    { action_raise_error("_ACE_TOOL_SELECT requires SLOT=1..4") }
  {% elif print_state == "printing" %}
    _ACE_ORCA_TOOLCHANGE SLOT={slot}
  {% elif current_slot == slot %}
    RESPOND TYPE=echo MSG="Tool {slot} already active"
  {% else %}
    RESPOND TYPE=echo MSG="Tool select ignored outside print: slot {slot}"
  {% endif %}

[gcode_macro T0]
gcode:
  _ACE_TOOL_SELECT SLOT=1

[gcode_macro T1]
gcode:
  _ACE_TOOL_SELECT SLOT=2

[gcode_macro T2]
gcode:
  _ACE_TOOL_SELECT SLOT=3

[gcode_macro T3]
gcode:
  _ACE_TOOL_SELECT SLOT=4
