# User-editable ACE Pro integration settings.
#
# This file is installed outside the readonly config bundle so the values here
# can be tuned directly on the printer without rebuilding firmware.

[respond]

[save_variables]
filename: /user-resource/ace-vars.cfg

[ace]
enabled: False
# If the default by-id path does not exist on your machine, check /dev/serial/by-id.
serial: /dev/serial/by-id/usb-ANYCUBIC_ACE_0-if00
baud: 115200
feed_speed: 25
retract_speed: 25
toolchange_retract_length: 100
retract_mode: 0
park_hit_count: 5
assist_poll_interval: 0.7
command_margin: 2.0
operation_timeout: 30.0
request_timeout: 2.0
keepalive_interval: 1.5
reconnect_interval: 1.0
disable_assist_after_toolchange: True
max_dryer_temperature: 55
default_drying_duration: 240
drying_fan_speed: 7000
allow_drying_while_printing: False
verify_sensor: disabled
# Optional full Klipper object name, for example:
# toolhead_sensor: filament_switch_sensor external_runout
toolhead_sensor:
pre_toolchange_macro: _ACE_PRE_TOOLCHANGE
post_toolchange_macro: _ACE_POST_TOOLCHANGE
empty_error_macro: _ACE_ON_EMPTY_ERROR
verify_error_macro: _ACE_ON_VERIFY_ERROR
comm_error_macro: _ACE_ON_COMM_ERROR

[gcode_macro _ACE_VARS]
variable_use_cutter: 1
variable_cutter_clearance_z: 14.5
variable_cutter_entry_y: 30.0
variable_cutter_x: 255.0
variable_cutter_cut_y: 3.0
variable_cutter_return_y: 30.0
variable_toolhead_release_length: 30.0
variable_toolhead_release_speed: 4.0
variable_post_load_prime_length: 0.0
variable_post_load_prime_speed: 4.0
variable_wipe_after_load: 1
gcode:

[gcode_macro _ACE_PRE_TOOLCHANGE]
description: Prepare the Centauri Carbon toolhead for ACE unload
gcode:
    {% set v = printer["gcode_macro _ACE_VARS"] %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    G90
    {% if v.use_cutter|int != 0 %}
        G0 Z{v.cutter_clearance_z|float} F600
        G0 Y{v.cutter_entry_y|float} F15000
        G0 X{v.cutter_x|float} F8000
        G0 Y{v.cutter_cut_y|float} F1200
        G0 Y{v.cutter_return_y|float} F8000
    {% endif %}

    MOVE_TO_TRAY
    M83
    G92 E0
    {% if v.toolhead_release_length|float > 0 and printer.extruder.can_extrude %}
        G1 E-{v.toolhead_release_length|float} F{v.toolhead_release_speed|float * 60.0}
    {% endif %}
    M400

[gcode_macro _ACE_POST_TOOLCHANGE]
description: Finish an ACE toolchange on the Centauri Carbon
gcode:
    {% set v = printer["gcode_macro _ACE_VARS"] %}
    M83
    G92 E0
    {% if v.post_load_prime_length|float > 0 and printer.extruder.can_extrude %}
        G1 E{v.post_load_prime_length|float} F{v.post_load_prime_speed|float * 60.0}
        M400
    {% endif %}
    {% if v.wipe_after_load|int != 0 and printer.extruder.can_extrude %}
        M729
    {% endif %}

[gcode_macro _ACE_ON_EMPTY_ERROR]
gcode:
    {action_respond_info("ACE slot is not ready")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro _ACE_ON_VERIFY_ERROR]
gcode:
    {action_respond_info("ACE load verification failed")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro _ACE_ON_COMM_ERROR]
gcode:
    {action_respond_info("ACE communication error")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro T0]
gcode:
    ACE_CHANGE_TOOL TOOL=0

[gcode_macro T1]
gcode:
    ACE_CHANGE_TOOL TOOL=1

[gcode_macro T2]
gcode:
    ACE_CHANGE_TOOL TOOL=2

[gcode_macro T3]
gcode:
    ACE_CHANGE_TOOL TOOL=3

[gcode_macro _ACE_UNLOAD_ACTIVE]
gcode:
    ACE_CHANGE_TOOL TOOL=-1

# ACE panel controls for Mainsail/Moonraker macro UI
[gcode_macro _ACE_PANEL_VARS]
variable_feed_length: 120
variable_retract_length: 120
variable_speed: 25
variable_dry_temp: 45
variable_dry_duration: 240
gcode:

[gcode_macro _ACE_PANEL_STATUS]
description: Refresh ACE status in console
gcode:
    ACE_QUERY_STATUS

[gcode_macro ACE_PANEL_FEED_SLOT]
description: Feed a slot to test loading (SLOT=0..3 LENGTH=mm SPEED=1..25)
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    {% set slot = params.SLOT|int %}
    {% if slot < 0 or slot > 3 %}
        {action_raise_error("ACE_PANEL_FEED_SLOT: SLOT must be 0..3")}
    {% endif %}
    {% set length = params.LENGTH|default(v.feed_length)|int %}
    {% set speed = params.SPEED|default(v.speed)|int %}
    ACE_FEED INDEX={slot} LENGTH={length} SPEED={speed}

[gcode_macro ACE_PANEL_RETRACT_SLOT]
description: Retract a slot to test unloading (SLOT=0..3 LENGTH=mm SPEED=1..25)
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    {% set slot = params.SLOT|int %}
    {% if slot < 0 or slot > 3 %}
        {action_raise_error("ACE_PANEL_RETRACT_SLOT: SLOT must be 0..3")}
    {% endif %}
    {% set length = params.LENGTH|default(v.retract_length)|int %}
    {% set speed = params.SPEED|default(v.speed)|int %}
    ACE_RETRACT INDEX={slot} LENGTH={length} SPEED={speed}

[gcode_macro _ACE_PANEL_CONNECTION]
description: Print ACE connection state
gcode:
    {% if printer.ace is defined and printer.ace.connected %}
        {action_respond_info("ACE CONNECTED")}
    {% else %}
        {action_respond_info("ACE DISCONNECTED")}
    {% endif %}

[gcode_macro _ACE_PANEL_LOAD_SLOT]
description: Load slot into toolhead (SLOT=0..3)
gcode:
    {% set slot = params.SLOT|int %}
    {% if slot < 0 or slot > 3 %}
        {action_raise_error("ACE_PANEL_LOAD_SLOT: SLOT must be 0..3")}
    {% endif %}
    ACE_CHANGE_TOOL TOOL={slot}

[gcode_macro _ACE_PANEL_UNLOAD]
description: Unload currently active filament from toolhead
gcode:
    ACE_CHANGE_TOOL TOOL=-1

[gcode_macro _ACE_PANEL_FEED_T0]
description: Feed slot T0 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_FEED INDEX=0 LENGTH={v.feed_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_FEED_T1]
description: Feed slot T1 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_FEED INDEX=1 LENGTH={v.feed_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_FEED_T2]
description: Feed slot T2 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_FEED INDEX=2 LENGTH={v.feed_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_FEED_T3]
description: Feed slot T3 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_FEED INDEX=3 LENGTH={v.feed_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_RETRACT_T0]
description: Retract slot T0 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_RETRACT INDEX=0 LENGTH={v.retract_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_RETRACT_T1]
description: Retract slot T1 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_RETRACT INDEX=1 LENGTH={v.retract_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_RETRACT_T2]
description: Retract slot T2 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_RETRACT INDEX=2 LENGTH={v.retract_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_RETRACT_T3]
description: Retract slot T3 using panel defaults
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    ACE_RETRACT INDEX=3 LENGTH={v.retract_length|int} SPEED={v.speed|int}

[gcode_macro _ACE_PANEL_LOAD_T0]
description: Load T0 to toolhead
gcode:
    ACE_CHANGE_TOOL TOOL=0

[gcode_macro _ACE_PANEL_LOAD_T1]
description: Load T1 to toolhead
gcode:
    ACE_CHANGE_TOOL TOOL=1

[gcode_macro _ACE_PANEL_LOAD_T2]
description: Load T2 to toolhead
gcode:
    ACE_CHANGE_TOOL TOOL=2

[gcode_macro _ACE_PANEL_LOAD_T3]
description: Load T3 to toolhead
gcode:
    ACE_CHANGE_TOOL TOOL=3

[gcode_macro ACE_PANEL_DRY_START]
description: Start dryer (TEMP=45 DURATION=240 minutes)
gcode:
    {% set v = printer["gcode_macro _ACE_PANEL_VARS"] %}
    {% set temp = params.TEMP|default(v.dry_temp)|int %}
    {% set duration = params.DURATION|default(v.dry_duration)|int %}
    ACE_START_DRYING TEMPERATURE={temp} DURATION={duration}

[gcode_macro ACE_PANEL_DRY_STOP]
description: Stop dryer
gcode:
    ACE_STOP_DRYING
