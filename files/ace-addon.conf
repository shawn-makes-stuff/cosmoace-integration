[service]
listen_host = 0.0.0.0
listen_port = 8091
log_path = /board-resource/ace-addon.log
panel_path = /user-resource/ace-addon/ace-panel.html

[ace]
# Use "auto" to select a free USB serial device and avoid ports used by Klipper.
serial_port = auto
baudrate = 115200
connect_timeout_s = 1.0
command_timeout_s = 1.0
rpc_timeout_s = 1.5
read_idle_s = 0.08
read_max_bytes = 4096
feed_speed = 25
retract_speed = 15
dry_fan_speed = 7000
keepalive_enabled = true
keepalive_interval_s = 1.0

[defaults]
feed_mm = 90
retract_mm = 90
dry_temp_c = 45
dry_minutes = 240
