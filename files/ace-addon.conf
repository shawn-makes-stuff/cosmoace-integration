[ace]
# Using a specific TTY to try and keep it away from Klipper's auto-scan if possible.
serial_port = /dev/ttyACM0
baudrate = 115200
command_timeout_s = 1.0
rpc_timeout_s = 2.5
read_idle_s = 0.08
read_max_bytes = 4096
feed_speed = 25
retract_speed = 15
dry_fan_speed = 7000
log_path = /board-resource/ace-addon.log

[defaults]
feed_mm = 90
retract_mm = 90
dry_temp_c = 45
dry_minutes = 240

[klipper]
sensor_name = runout

[moonraker]
url = http://127.0.0.1:7125
timeout_s = 3.0

[service]
listen_host = 127.0.0.1
listen_port = 8091
